<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nagyou | Profile</title>
    <style>
        :root {
            --main-green: #00ffaa;
            --deep-green: #001a11;
            /* グラスモーフィズムの背景：さらに薄く、透明に */
            --glass-bg: rgba(255, 255, 255, 0.015);
            /* ぼかし：ふちを消し去るため、さらに強力に */
            --glass-blur: blur(40px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--deep-green);
            /* 深みのあるグラデーションを追加 */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 255, 170, 0.05), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 51, 34, 0.5), transparent 50%);
            color: #fff; 
            font-family: 'Inter', 'Helvetica Neue', sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 波の背景：ふちが完全に背景に溶け込むように調整 */
        .waves-container {
            position: fixed;
            bottom: -100px; /* さらに下に配置してふちを隠す */
            left: 0;
            width: 100%;
            height: 400px; /* 高さを増して、グラデーションの幅を広げる */
            z-index: -1;
            opacity: 0.5; /* 透明度を上げて、より自然に */
            /* ふちをぼかすためのSVGマスクを追加（これが鍵） */
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
        }

        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 100%;
            /* 波の色を背景より少し明るい緑に */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23004d33" fill-opacity="0.2" d="M0,192L48,197.3C96,203,192,213,288,192C384,171,480,117,576,112C672,107,768,149,864,165.3C960,181,1056,171,1152,149.3C1248,128,1344,96,1392,80L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: 50% 100%;
            animation: wave-move 15s ease-in-out infinite alternate;
        }

        .wave:nth-child(2) {
            animation-duration: 25s;
            opacity: 0.2;
            bottom: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%2300ffaa" fill-opacity="0.1" d="M0,160L60,170.7C120,181,240,203,360,197.3C480,192,600,160,720,138.7C840,117,960,107,1080,128C1200,149,1320,203,1380,229.3L1440,256L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path></svg>');
        }

        @keyframes wave-move {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ナビゲーション */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 60px; /* 余白を広げて、よりクリーンに */
            display: flex; justify-content: space-between;
            background: transparent; /* 背景を透明に */
            z-index: 100;
        }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            margin-left: 30px; 
            font-size: 0.8rem; 
            letter-spacing: 2px; /* 文字間隔を広げて、より洗練された印象に */
            text-transform: uppercase;
            opacity: 0.6; 
            transition: 0.4s; 
        }
        .nav-links a:hover { opacity: 1; color: var(--main-green); text-shadow: 0 0 10px rgba(0, 255, 170, 0.5); }

        /* ヒーローエリア */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        /* テキストのふちを滑らかにする効果を追加 */
        .hero h1 { 
            font-size: 7rem; 
            font-weight: 100; 
            letter-spacing: 20px; 
            background: linear-gradient(to bottom, #fff, var(--main-green)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 30px rgba(0, 255, 170, 0.1);
        }

        /* 自己紹介カード：ふちが完全に消え、背景に溶け込む */
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 80px; /* 余白を広げて、より開放的に */
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.03); /* さらに薄く、見えない枠に */
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6); /* 影を強くして、浮遊感を演出 */
            display: flex;
            align-items: center;
            gap: 80px;
            transition: all 0.5s ease;
        }
        
        /* ホバー時の効果をより洗練されたものに */
        .profile-card:hover {
            transform: translateY(-15px) scale(1.02);
            border: 1px solid rgba(0, 255, 170, 0.1);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 255, 170, 0.1);
        }

        /* アイコン：完璧な円、ico.pngを指定 */
        .profile-image {
            width: 240px;
            height: 240px;
            border-radius: 50%; /* 完璧な円 */
            border: 2px solid rgba(0, 255, 170, 0.2); /* 薄い緑の枠を追加 */
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.3);
            object-fit: cover; /* 画像を枠内に収める */
        }

        /* テキストエリアの調整 */
        .info-label { color: rgba(0, 255, 170, 0.8); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .info-value { font-size: 1.3rem; font-weight: 200; margin-bottom: 25px; letter-spacing: 1px; }

        /* CONTACTリンク：よりミニマルに */
        .contact-links a {
            color: #fff;
            text-decoration: none;
            margin: 0 30px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 8px;
            opacity: 0.7;
            transition: 0.4s;
        }
        .contact-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 1px;
            background: var(--main-green);
            transition: 0.4s;
            box-shadow: 0 0 10px var(--main-green);
        }
        .contact-links a:hover { opacity: 1; color: var(--main-green); }
        .contact-links a:hover::after { width: 100%; }

    </style>
</head>
<body>

    <div class="waves-container">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <nav>
        <div style="letter-spacing: 8px; font-weight: 200; color: #fff; font-size: 1.1rem;">NAGYOU</div>
        <div class="nav-links">
            <a href="#">HOME</a>
            <a href="#about">ABOUT</a>
            <a href="#contact">CONTACT</a>
        </div>
    </nav>

    <header class="hero">
        <h1>nagyou</h1>
        <p style="letter-spacing: 15px; font-weight: 200; opacity: 0.4; font-size: 0.9rem;">web クリエイター</p>
    </header>

    <div class="container" id="about" style="max-width: 1100px; margin: 0 auto; padding-bottom: 250px;">
        <div class="profile-card">
            <img src="ico.png" alt="nagyou" class="profile-image">
            
            <div class="profile-details">
                <div class="info-item">
                    <p class="info-label">Name</p>
                    <p class="info-value">nagyou</p>
                </div>
                <div class="info-item">
                    <p class="info-label">Age / Skill</p>
                    <p class="info-value">Unknown / HTML & Python</p>
                </div>
                <div class="info-item">
                    <p class="info-label">Location</p>
                    <p class="info-value">Earth</p>
                </div>
                <p class="description" style="opacity: 0.5; font-weight: 200; font-size: 0.9rem; line-height: 2; margin-top: 10px;">
                    どこにでもいそうな一般人です。web代行とか暇なときやってます。
                </p>
            </div>
        </div>

        <section id="contact" style="text-align: center; margin-top: 200px;">
            <h2 style="font-weight: 100; letter-spacing: 15px; margin-bottom: 70px; color: #fff; font-size: 2rem;">CONTACT</h2>
            <div class="contact-links">
                <a href="#">X (Twitter)</a>
                <a href="https://discord.com/users/1414904182111993899">DISCORD</a>
                <a href="#">EMAIL</a>
            </div>
        </section>
    </div>

</body>
</html>
